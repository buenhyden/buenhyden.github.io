name: Pages CI Build and Deploy

on:
    workflow_dispatch:
        inputs:
            source_repo:
                description:
                    "Private source repository. Example: buenhyden/blog-data"
                required: true
                type: string
            source_ref_name:
                description: "Branch name in private repo"
                required: true
                type: string
            source_sha:
                description: "Commit SHA in private repo"
                required: true
                type: string
            source_event:
                description: "Original event name"
                required: false
                type: string

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build:
        runs-on: ubuntu-latest

        env:
            PRIVATE_REPO_DIR: __private_blog_data
            PRIVATE_WEB_DIR: __private_blog_data/web
            PAGES_ARTIFACT_DIR: __pages_artifact

        steps:
            - name: Checkout public Pages repo
              uses: actions/checkout@v5
              with:
                  persist-credentials: false
                  fetch-depth: 1

            - name: Checkout private blog-data into temporary workspace only
              uses: actions/checkout@v5
              with:
                  repository: ${{ inputs.source_repo }}
                  ref: ${{ inputs.source_ref_name }}
                  token: ${{ secrets.BLOG_DEPLOY_TOKEN }}
                  path: ${{ env.PRIVATE_REPO_DIR }}
                  persist-credentials: false
                  fetch-depth: 1
                  submodules: recursive

            - name: Verify exact private source commit
              working-directory: ${{ env.PRIVATE_REPO_DIR }}
              run: |
                  set -euo pipefail
                  ACTUAL_SHA="$(git rev-parse HEAD)"
                  echo "expected=${{ inputs.source_sha }}"
                  echo "actual=${ACTUAL_SHA}"
                  test "${ACTUAL_SHA}" = "${{ inputs.source_sha }}"

            - name: Ensure web directory exists
              run: |
                  set -euo pipefail
                  test -d "${PRIVATE_WEB_DIR}"
                  test -f "${PRIVATE_WEB_DIR}/package.json"

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: npm
                  cache-dependency-path:
                      ${{ env.PRIVATE_WEB_DIR }}/package-lock.json

            - name: Show Node version
              working-directory: ${{ env.PRIVATE_WEB_DIR }}
              run: |
                  node -v
                  npm -v

            - name: Configure GitHub Pages
              uses: actions/configure-pages@v5

            - name: Install dependencies
              working-directory: ${{ env.PRIVATE_WEB_DIR }}
              run: npm ci

            - name: CI - Lint
              working-directory: ${{ env.PRIVATE_WEB_DIR }}
              run: npm run lint

            - name: CI - Type Check
              working-directory: ${{ env.PRIVATE_WEB_DIR }}
              run: npm run typecheck --if-present

            - name: Unit Test
              working-directory: ${{ env.PRIVATE_WEB_DIR }}
              run: npm run test:unit

            - name: Format generated files
              working-directory: ${{ env.PRIVATE_WEB_DIR }}
              run: npx prettier --write "src/generated/route-map.json"
            - name: Build static site
              working-directory: ${{ env.PRIVATE_WEB_DIR }}
              env:
                  NODE_ENV: production
                  BLOG_ENV: production
              run: npm run build:ci

            - name: Verify exported routes before publish
              env:
                  TEST_EXPORT: 1
              run: npm run verify:export

            - name: Create .nojekyll
              working-directory: ${{ env.PRIVATE_WEB_DIR }}
              run: touch out/.nojekyll

            - name: Enforce no repository metadata in output
              working-directory: ${{ env.PRIVATE_WEB_DIR }}
              run: |
                  set -euo pipefail

                  if find ./out -type d \( -name ".git" -o -name ".github" \) | grep -q .; then
                    echo "Forbidden repository metadata found in output"
                    exit 1
                  fi

            - name: Copy static output to safe upload directory
              run: |
                  set -euo pipefail
                  rm -rf "${PAGES_ARTIFACT_DIR}"
                  mkdir -p "${PAGES_ARTIFACT_DIR}"
                  rsync -a --delete "${PRIVATE_WEB_DIR}/out/" "${PAGES_ARTIFACT_DIR}/"

            - name: Remove temporary private checkout before upload
              run: |
                  set -euo pipefail
                  rm -rf "${PRIVATE_REPO_DIR}"

            - name: Verify private source is fully removed
              run: |
                  set -euo pipefail
                  test ! -e "${PRIVATE_REPO_DIR}"
                  test -d "${PAGES_ARTIFACT_DIR}"
                  test ! -e "${PAGES_ARTIFACT_DIR}/.git"
                  test ! -e "${PAGES_ARTIFACT_DIR}/.github"
                  test ! -e "${PAGES_ARTIFACT_DIR}/web"

            - name: Upload Pages artifact only
              uses: actions/upload-pages-artifact@v4
              with:
                  path: ./${{ env.PAGES_ARTIFACT_DIR }}

            - name: Final cleanup
              if: always()
              run: |
                  rm -rf "${PRIVATE_REPO_DIR}" "${PAGES_ARTIFACT_DIR}"

    deploy:
        runs-on: ubuntu-latest
        needs: build
        timeout-minutes: 15

        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}

        steps:
            - name: Deploy Pages artifact
              id: deployment
              uses: actions/deploy-pages@v4

    smoke_post_deploy:
        needs: deploy
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - name: Verify core endpoints availability
              shell: bash
              run: |
                  set -euo pipefail

                  ROUTES=(
                      "/"
                      "/about/"
                      "/about/projects/"
                      "/about/experiences/"
                      "/about/skills/"
                      "/search/"
                      "/posts/"
                      "/til/"
                      "/tags/"
                      "/categories/"
                  )

                  for route in "${ROUTES[@]}"; do
                      url="https://buenhyden.github.io${route}"
                      echo "Checking ${url}"
                      success=0
                      for attempt in 1 2 3 4 5; do
                      if curl -fsSL "$url" > /dev/null; then
                          success=1
                          break
                      fi
                      sleep 10
                      done

                      if [ "$success" -ne 1 ]; then
                      echo "Smoke check failed for ${url}"
                      exit 1
                      fi
                  done
